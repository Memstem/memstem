name: Release

on:
  push:
    tags:
      - "v*.*.*"
  # Manual publishing escape hatch — used for the first PyPI upload (the
  # version was already tagged before the pypi job existed) and for re-runs
  # after a transient publish failure. Skips the GitHub-release job.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Publish GitHub release from CHANGELOG
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract CHANGELOG section
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="$VERSION" \
            '$0 ~ "^## \\["ver"\\]" {p=1; next} /^## \[/ {p=0} p' \
            CHANGELOG.md > release-notes.md
          if ! grep -q '[^[:space:]]' release-notes.md; then
            echo "::error::No CHANGELOG.md section found for ${VERSION} — add one before tagging." >&2
            exit 1
          fi

      - name: Build release title
        run: |
          # Title is "vX.Y.Z — <summary paragraph>" when the section opens with
          # prose before the first ### heading; bare "vX.Y.Z" otherwise.
          SUMMARY=$(awk '/^#/{exit} NF{printf "%s ", $0}' release-notes.md \
            | sed 's/ $//' | cut -c1-120)
          if [ -n "$SUMMARY" ]; then
            echo "RELEASE_TITLE=${GITHUB_REF_NAME} — ${SUMMARY}" >> "$GITHUB_ENV"
          else
            echo "RELEASE_TITLE=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          fi

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$RELEASE_TITLE" \
            --notes-file release-notes.md \
            --verify-tag

  pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # OIDC for PyPI Trusted Publishing — no stored token
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify tag matches pyproject version
        if: github.event_name == 'push'
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PY_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$TAG_VERSION" != "$PY_VERSION" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match pyproject.toml version ${PY_VERSION}" >&2
            exit 1
          fi

      - name: Build sdist and wheel
        run: |
          python -m pip install --quiet build
          python -m build

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
